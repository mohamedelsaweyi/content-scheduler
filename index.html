<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Scheduler – سكيدوال المحتوى</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#0A0A0A;color:#F0EFE8;font-family:'Cairo','Segoe UI',sans-serif;min-height:100vh;}
  ::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:#2A2A2A;border-radius:3px;}

  /* Header */
  .header{background:#111;border-bottom:1px solid #1E1E1E;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:50;}
  .logo{display:flex;align-items:center;gap:12px;}
  .logo-icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#6366F1 0%,#8B5CF6 100%);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 15px #6366F150;}
  .logo-text h1{font-size:16px;font-weight:700;letter-spacing:.3px;}
  .logo-text p{font-size:11px;color:#555;margin-top:1px;}
  .view-tabs{display:flex;gap:6px;}
  .view-btn{background:transparent;border:1px solid #222;color:#666;border-radius:8px;padding:7px 16px;cursor:pointer;font-size:13px;font-family:'Cairo',sans-serif;transition:all .15s;}
  .view-btn.active{background:#6366F1;border-color:#6366F1;color:#fff;}
  .view-btn:hover:not(.active){border-color:#333;color:#ccc;}

  /* Main */
  .main{max-width:980px;margin:0 auto;padding:24px 20px;}

  /* Controls bar */
  .controls{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:22px;}
  .month-nav{display:flex;align-items:center;gap:10px;}
  .nav-btn{background:#161616;border:1px solid #222;color:#ccc;border-radius:8px;width:34px;height:34px;cursor:pointer;font-size:18px;transition:all .15s;display:flex;align-items:center;justify-content:center;}
  .nav-btn:hover{background:#1E1E1E;border-color:#333;}
  .month-label{font-size:20px;font-weight:700;min-width:170px;text-align:center;color:#F0EFE8;}
  .filters{display:flex;gap:7px;flex-wrap:wrap;}
  .pf-btn{border-radius:20px;padding:5px 14px;cursor:pointer;font-size:12px;font-family:'Cairo',sans-serif;font-weight:600;transition:all .15s;border:1px solid;display:flex;align-items:center;gap:5px;}

  /* Stats */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px;}
  .stat-card{background:#111;border:1px solid #1E1E1E;border-radius:12px;padding:14px 16px;text-align:center;transition:transform .15s;}
  .stat-card:hover{transform:translateY(-2px);}
  .stat-num{font-size:28px;font-weight:800;line-height:1;}
  .stat-label{font-size:12px;color:#555;margin-top:4px;}

  /* Calendar */
  .calendar{background:#111;border:1px solid #1E1E1E;border-radius:16px;overflow:hidden;}
  .cal-headers{display:grid;grid-template-columns:repeat(7,1fr);background:#141414;border-bottom:1px solid #1E1E1E;}
  .cal-hdr{padding:10px 0;text-align:center;font-size:12px;color:#444;font-weight:600;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:#1A1A1A;}
  .cal-cell{background:#111;min-height:90px;padding:7px;cursor:pointer;transition:background .15s;position:relative;}
  .cal-cell:hover{background:#161616;}
  .cal-cell.empty{background:#0D0D0D;cursor:default;}
  .cal-cell.today{border-top:2px solid #6366F1;}
  .day-num{font-size:12px;font-weight:600;color:#3A3A3A;margin-bottom:4px;}
  .cal-cell.today .day-num{color:#818CF8;}
  .pill{font-size:11px;padding:3px 7px;border-radius:5px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;display:flex;align-items:center;gap:4px;transition:opacity .15s;}
  .pill:hover{opacity:.75;}
  .more-posts{font-size:10px;color:#444;margin-top:2px;}
  .cell-add{position:absolute;bottom:5px;left:6px;font-size:18px;color:#2A2A2A;line-height:1;opacity:0;transition:opacity .15s;}
  .cal-cell:hover .cell-add{opacity:1;}

  /* List */
  .list-wrap{background:#111;border:1px solid #1E1E1E;border-radius:16px;overflow:hidden;}
  .list-empty{text-align:center;padding:4rem;color:#444;}
  .list-empty .empty-icon{font-size:48px;margin-bottom:14px;}
  .post-row{display:flex;align-items:center;gap:14px;padding:14px 20px;border-bottom:1px solid #161616;cursor:pointer;transition:background .15s;}
  .post-row:hover{background:#161616;}
  .post-row:last-child{border-bottom:none;}
  .post-date-col{width:42px;text-align:center;flex-shrink:0;}
  .post-date-num{font-size:20px;font-weight:800;line-height:1;}
  .post-date-day{font-size:11px;color:#444;margin-top:2px;}
  .plat-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .post-info{flex:1;min-width:0;}
  .post-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .post-sub{font-size:12px;color:#555;margin-top:3px;}
  .status-badge{font-size:12px;padding:4px 12px;border-radius:20px;flex-shrink:0;font-weight:600;}

  /* Add btn */
  .add-fab{display:inline-flex;align-items:center;gap:9px;margin-top:18px;background:linear-gradient(135deg,#6366F1,#8B5CF6);border:none;color:#fff;border-radius:12px;padding:11px 22px;cursor:pointer;font-size:14px;font-weight:700;font-family:'Cairo',sans-serif;box-shadow:0 4px 20px #6366F150;transition:all .15s;}
  .add-fab:hover{transform:translateY(-1px);box-shadow:0 6px 25px #6366F170;}
  .add-fab span{font-size:20px;}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px);}
  .overlay.hidden{display:none;}
  .modal{background:#111;border:1px solid #252525;border-radius:18px;padding:26px;width:400px;max-width:95vw;max-height:90vh;overflow-y:auto;}
  .modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
  .modal-title{font-size:16px;font-weight:700;}
  .modal-close{background:none;border:none;color:#555;cursor:pointer;font-size:22px;line-height:1;padding:2px 6px;}
  .modal-close:hover{color:#ccc;}
  .field{margin-bottom:15px;}
  .field label{font-size:13px;color:#777;display:block;margin-bottom:6px;font-weight:500;}
  .field input,.field select,.field textarea{background:#161616;border:1px solid #252525;color:#F0EFE8;border-radius:9px;padding:9px 13px;font-size:14px;width:100%;outline:none;font-family:'Cairo',sans-serif;transition:border-color .15s;}
  .field input:focus,.field select,.field select:focus,.field textarea:focus{border-color:#6366F1;}
  .field textarea{resize:vertical;min-height:70px;}
  option{background:#161616;}
  .modal-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:22px;align-items:center;}
  .btn-delete{background:transparent;border:1px solid #3A1515;color:#EF4444;border-radius:9px;padding:9px 16px;cursor:pointer;font-size:13px;font-family:'Cairo',sans-serif;margin-right:auto;}
  .btn-delete:hover{background:#3A1515;}
  .btn-cancel{background:transparent;border:1px solid #252525;color:#777;border-radius:9px;padding:9px 18px;cursor:pointer;font-size:13px;font-family:'Cairo',sans-serif;}
  .btn-cancel:hover{border-color:#333;color:#ccc;}
  .btn-save{background:linear-gradient(135deg,#6366F1,#8B5CF6);border:none;color:#fff;border-radius:9px;padding:9px 22px;cursor:pointer;font-size:14px;font-weight:700;font-family:'Cairo',sans-serif;}
  .btn-save:hover{opacity:.9;}

  @media(max-width:600px){
    .stats{grid-template-columns:repeat(2,1fr);}
    .header{padding:12px 16px;}
    .main{padding:16px 12px;}
    .month-label{font-size:16px;min-width:130px;}
    .cal-cell{min-height:65px;padding:4px;}
    .pill{font-size:10px;}
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <div class="logo-icon">📅</div>
    <div class="logo-text">
      <h1>Content Scheduler</h1>
      <p>سكيدوال المحتوى الشهري</p>
    </div>
  </div>
  <div class="view-tabs">
    <button class="view-btn active" id="btn-cal" onclick="setView('calendar')">📆 تقويم</button>
    <button class="view-btn" id="btn-list" onclick="setView('list')">📋 قائمة</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- Controls -->
  <div class="controls">
    <div class="month-nav">
      <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
      <div class="month-label" id="monthLabel"></div>
      <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
    </div>
    <div class="filters" id="filterBtns"></div>
  </div>

  <!-- Stats -->
  <div class="stats" id="statsRow"></div>

  <!-- Calendar -->
  <div id="calView">
    <div class="calendar">
      <div class="cal-headers" id="calHeaders"></div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
  </div>

  <!-- List -->
  <div id="listView" style="display:none;">
    <div class="list-wrap" id="listWrap"></div>
  </div>

  <!-- FAB -->
  <button class="add-fab" onclick="openAdd()"><span>+</span> إضافة بوست جديد</button>
</div>

<!-- MODAL -->
<div class="overlay hidden" id="overlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">➕ إضافة بوست</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="field"><label>التاريخ</label><input type="date" id="fDate"></div>
    <div class="field"><label>المنصة</label>
      <select id="fPlatform">
        <option value="ig">Instagram</option>
        <option value="fb">Facebook</option>
        <option value="tt">TikTok</option>
        <option value="yt">YouTube</option>
      </select>
    </div>
    <div class="field"><label>عنوان البوست / الفكرة</label><input type="text" id="fTitle" placeholder="اكتب فكرة البوست..."></div>
    <div class="field"><label>نوع المحتوى</label>
      <select id="fType">
        <option>ريلز / فيديو قصير</option>
        <option>صورة + كابشن</option>
        <option>كاروسيل</option>
        <option>ستوري</option>
        <option>بث مباشر</option>
        <option>بوست عادي</option>
      </select>
    </div>
    <div class="field"><label>الحالة</label>
      <select id="fStatus">
        <option value="planned">مجدول</option>
        <option value="draft">مسودة</option>
        <option value="done">نُشر</option>
      </select>
    </div>
    <div class="field"><label>ملاحظات / هاشتاقات (اختياري)</label><textarea id="fNotes" placeholder="كابشن، هاشتاقات، أفكار..."></textarea></div>
    <div class="modal-btns">
      <button class="btn-delete" id="btnDelete" style="display:none;" onclick="deletePost()">🗑 حذف</button>
      <button class="btn-cancel" onclick="closeModal()">إلغاء</button>
      <button class="btn-save" onclick="savePost()">حفظ ✓</button>
    </div>
  </div>
</div>

<script>
const MONTHS = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const DAYS   = ['أحد','اثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت'];
const DAYS_S = ['أحد','اثن','ثلا','أربع','خميس','جمعة','سبت'];
const PLT_COLOR = {ig:'#E1306C',fb:'#1877F2',tt:'#888',yt:'#FF0000'};
const PLT_NAME  = {ig:'Instagram',fb:'Facebook',tt:'TikTok',yt:'YouTube'};
const PLT_SVG   = {
  ig:`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>`,
  fb:`<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>`,
  tt:`<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.34 6.34 0 0 0-6.13 6.33 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34v-7a8.16 8.16 0 0 0 4.77 1.52V6.38a4.85 4.85 0 0 1-1-.31z"/></svg>`,
  yt:`<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46a2.78 2.78 0 0 0-1.95 1.96A29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58A2.78 2.78 0 0 0 3.41 19.54C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.95-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="white"/></svg>`
};
const ST_CFG = {
  planned:{label:'مجدول',   bg:'#1E1E38',color:'#818CF8'},
  draft:  {label:'مسودة',   bg:'#2A1E0A',color:'#F59E0B'},
  done:   {label:'نُشر ✓',  bg:'#0A2018',color:'#34D399'},
};

let now = new Date();
let curYear  = now.getFullYear();
let curMonth = now.getMonth();
let activeFilters = new Set(['ig','fb','tt','yt']);
let currentView = 'calendar';
let editingId = null;

// ---- STORAGE ----
function loadPosts(){
  try{ return JSON.parse(localStorage.getItem('cs_posts')||'null') || defaultPosts(); }
  catch(e){ return defaultPosts(); }
}
function savePosts(){ localStorage.setItem('cs_posts', JSON.stringify(posts)); }
function defaultPosts(){
  const y=curYear, m=String(curMonth+1).padStart(2,'0');
  const d=n=>`${y}-${m}-${String(n).padStart(2,'0')}`;
  return [
    {id:1,date:d(3), platform:'ig',title:'بوست تعريفي عن الأكاديمية',type:'صورة + كابشن',status:'done',notes:'هاشتاق: تعلم_الصينية'},
    {id:2,date:d(7), platform:'fb',title:'فيديو شرح الدرس الأول',type:'ريلز / فيديو قصير',status:'done',notes:''},
    {id:3,date:d(10),platform:'tt',title:'تحدي كلمة صينية',type:'ريلز / فيديو قصير',status:'planned',notes:''},
    {id:4,date:d(14),platform:'ig',title:'كاروسيل أرقام صينية',type:'كاروسيل',status:'draft',notes:'محتاج ديزاين'},
    {id:5,date:d(18),platform:'yt',title:'حلقة كاملة HSK1',type:'ريلز / فيديو قصير',status:'planned',notes:''},
    {id:6,date:d(22),platform:'fb',title:'بوست نتائج الطلاب',type:'صورة + كابشن',status:'planned',notes:''},
    {id:7,date:d(26),platform:'ig',title:'ستوري سؤال وجواب',type:'ستوري',status:'planned',notes:''},
    {id:8,date:d(28),platform:'tt',title:'أغنية تعليم أرقام',type:'ريلز / فيديو قصير',status:'draft',notes:''},
  ];
}

let posts = loadPosts();

// ---- HELPERS ----
function monthPosts(){
  const pfx=`${curYear}-${String(curMonth+1).padStart(2,'0')}`;
  return posts.filter(p=>p.date.startsWith(pfx) && activeFilters.has(p.platform));
}
function pad(n){return String(n).padStart(2,'0');}
function todayStr(){const t=new Date();return `${t.getFullYear()}-${pad(t.getMonth()+1)}-${pad(t.getDate())}`;}

// ---- RENDER ----
function render(){
  document.getElementById('monthLabel').textContent = `${MONTHS[curMonth]} ${curYear}`;
  renderFilters();
  renderStats();
  if(currentView==='calendar') renderCalendar();
  else renderList();
}

function renderFilters(){
  const el=document.getElementById('filterBtns');
  el.innerHTML='';
  Object.entries(PLT_NAME).forEach(([k,v])=>{
    const on=activeFilters.has(k);
    const btn=document.createElement('button');
    btn.className='pf-btn';
    btn.style.cssText=on
      ? `background:${PLT_COLOR[k]};border-color:${PLT_COLOR[k]};color:#fff;`
      : `background:transparent;border-color:#252525;color:#555;`;
    btn.innerHTML=`<span style="color:${on?'#fff':PLT_COLOR[k]}">${PLT_SVG[k]}</span>${v}`;
    btn.onclick=()=>{
      activeFilters.has(k)?activeFilters.delete(k):activeFilters.add(k);
      render();
    };
    el.appendChild(btn);
  });
}

function renderStats(){
  const mp=monthPosts();
  const counts={total:mp.length,done:mp.filter(p=>p.status==='done').length,planned:mp.filter(p=>p.status==='planned').length,draft:mp.filter(p=>p.status==='draft').length};
  document.getElementById('statsRow').innerHTML=[
    {n:counts.total,  label:'إجمالي البوستات', color:'#6366F1'},
    {n:counts.done,   label:'نُشر ✓',           color:'#34D399'},
    {n:counts.planned,label:'مجدول',             color:'#60A5FA'},
    {n:counts.draft,  label:'مسودة',             color:'#F59E0B'},
  ].map(s=>`<div class="stat-card"><div class="stat-num" style="color:${s.color}">${s.n}</div><div class="stat-label">${s.label}</div></div>`).join('');
}

function renderCalendar(){
  document.getElementById('calView').style.display='';
  document.getElementById('listView').style.display='none';

  // headers
  document.getElementById('calHeaders').innerHTML=DAYS_S.map(d=>`<div class="cal-hdr">${d}</div>`).join('');

  const firstDay=new Date(curYear,curMonth,1).getDay();
  const daysInMonth=new Date(curYear,curMonth+1,0).getDate();
  const tStr=todayStr();

  // build date→posts map
  const byDate={};
  monthPosts().forEach(p=>{
    if(!byDate[p.date])byDate[p.date]=[];
    byDate[p.date].push(p);
  });

  let html='';
  for(let i=0;i<firstDay;i++) html+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${curYear}-${pad(curMonth+1)}-${pad(d)}`;
    const dp=byDate[dateStr]||[];
    const tod=dateStr===tStr;
    let pills=dp.slice(0,3).map(p=>`
      <div class="pill" style="background:${PLT_COLOR[p.platform]}20;color:${PLT_COLOR[p.platform]};border:1px solid ${PLT_COLOR[p.platform]}40;" onclick="openEdit(${p.id},event)">
        ${PLT_SVG[p.platform]}<span style="overflow:hidden;text-overflow:ellipsis;">${p.title}</span>
      </div>`).join('');
    if(dp.length>3) pills+=`<div class="more-posts">+${dp.length-3} أكتر</div>`;
    html+=`<div class="cal-cell${tod?' today':''}" onclick="openAdd('${dateStr}')">
      <div class="day-num">${d}</div>${pills}<div class="cell-add">+</div>
    </div>`;
  }
  document.getElementById('calGrid').innerHTML=html;
}

function renderList(){
  document.getElementById('calView').style.display='none';
  document.getElementById('listView').style.display='';
  const mp=[...monthPosts()].sort((a,b)=>a.date.localeCompare(b.date));
  if(!mp.length){
    document.getElementById('listWrap').innerHTML=`<div class="list-empty"><div class="empty-icon">📭</div><div style="font-size:15px;color:#555;">مفيش بوستات للشهر ده</div><div style="font-size:12px;color:#3A3A3A;margin-top:6px;">اضغط على أي يوم في التقويم عشان تضيف</div></div>`;
    return;
  }
  document.getElementById('listWrap').innerHTML=mp.map(p=>{
    const dt=new Date(p.date+'T00:00:00');
    const sc=ST_CFG[p.status];
    return `<div class="post-row" onclick="openEdit(${p.id})">
      <div class="post-date-col"><div class="post-date-num">${dt.getDate()}</div><div class="post-date-day">${DAYS[dt.getDay()]}</div></div>
      <div class="plat-icon" style="background:${PLT_COLOR[p.platform]}18;color:${PLT_COLOR[p.platform]}">${PLT_SVG[p.platform]}</div>
      <div class="post-info">
        <div class="post-title">${p.title}</div>
        <div class="post-sub">${PLT_NAME[p.platform]} · ${p.type}</div>
      </div>
      <div class="status-badge" style="background:${sc.bg};color:${sc.color}">${sc.label}</div>
    </div>`;
  }).join('');
}

// ---- MODAL ----
function openAdd(dateStr){
  dateStr = dateStr || todayStr();
  editingId=null;
  document.getElementById('modalTitle').textContent='➕ إضافة بوست جديد';
  document.getElementById('btnDelete').style.display='none';
  document.getElementById('fDate').value=dateStr;
  document.getElementById('fPlatform').value='ig';
  document.getElementById('fTitle').value='';
  document.getElementById('fType').value='ريلز / فيديو قصير';
  document.getElementById('fStatus').value='planned';
  document.getElementById('fNotes').value='';
  document.getElementById('overlay').classList.remove('hidden');
}

function openEdit(id, e){
  if(e) e.stopPropagation();
  const p=posts.find(x=>x.id===id); if(!p)return;
  editingId=id;
  document.getElementById('modalTitle').textContent='✏️ تعديل البوست';
  document.getElementById('btnDelete').style.display='';
  document.getElementById('fDate').value=p.date;
  document.getElementById('fPlatform').value=p.platform;
  document.getElementById('fTitle').value=p.title;
  document.getElementById('fType').value=p.type;
  document.getElementById('fStatus').value=p.status;
  document.getElementById('fNotes').value=p.notes||'';
  document.getElementById('overlay').classList.remove('hidden');
}

function closeModal(e){
  if(e&&e.target!==document.getElementById('overlay'))return;
  document.getElementById('overlay').classList.add('hidden');
}

function savePost(){
  const title=document.getElementById('fTitle').value.trim();
  if(!title){document.getElementById('fTitle').style.borderColor='#EF4444';document.getElementById('fTitle').focus();return;}
  const data={
    date:document.getElementById('fDate').value,
    platform:document.getElementById('fPlatform').value,
    title,
    type:document.getElementById('fType').value,
    status:document.getElementById('fStatus').value,
    notes:document.getElementById('fNotes').value,
  };
  if(editingId){
    const idx=posts.findIndex(p=>p.id===editingId);
    if(idx>-1) posts[idx]={...posts[idx],...data};
  } else {
    posts.push({id:Date.now(),...data});
  }
  savePosts();
  document.getElementById('overlay').classList.add('hidden');
  render();
}

function deletePost(){
  if(!editingId)return;
  posts=posts.filter(p=>p.id!==editingId);
  savePosts();
  document.getElementById('overlay').classList.add('hidden');
  render();
}

function changeMonth(dir){
  curMonth+=dir;
  if(curMonth>11){curMonth=0;curYear++;}
  if(curMonth<0){curMonth=11;curYear--;}
  render();
}

function setView(v){
  currentView=v;
  document.getElementById('btn-cal').classList.toggle('active',v==='calendar');
  document.getElementById('btn-list').classList.toggle('active',v==='list');
  render();
}

// ---- INIT ----
render();
</script>
</body>
</html>
